<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Abhiram</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- AOS Animation -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0f172a;
      color: white;
      overflow-x: hidden;
    }
    #bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
    }
    .contact-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .text-gradient {
      background: linear-gradient(90deg,#00CFFF,#8A2BE2,#FF0080);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .glass {
      background: rgba(255,255,255,0.08)!important;
      backdrop-filter: blur(12px);
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(0,255,255,0.3);
    }
    .social-icons a {
      font-size: 2rem;
      margin: 0 12px;
      color: white;
      transition: 0.3s;
    }
    .social-icons a:hover {
      color: cyan;
      transform: scale(1.2);
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="contact-container" data-aos="fade-up">
  <h1 class="text-gradient mb-4">Contact Me</h1>
  <p class="lead mb-4">Let’s connect! Fill the form or reach me via social links.</p>

  <form class="p-4 glass text-light w-75 w-md-50">
    <input type="text" class="form-control mb-3" placeholder="Your Name" required>
    <input type="email" class="form-control mb-3" placeholder="Your Email" required>
    <textarea class="form-control mb-3" rows="4" placeholder="Your Message" required></textarea>
    <button class="btn btn-info w-100">Send</button>
  </form>

  <div class="social-icons mt-4">
    <a href="https://github.com/Jasabhiram" target="_blank"><i class="fab fa-github"></i></a>
    <a href="https://linkedin.com/in/gummaraju-jaswanth-abhiram-50547b289" target="_blank"><i class="fab fa-linkedin"></i></a>
    <a href="mailto:gjabhiram001@gmail.com"><i class="fas fa-envelope"></i></a>
  </div>

  <a href="2.html" class="btn btn-outline-light mt-4">⬅ Back to Home</a>
</div>

<script>
AOS.init();

// Three.js background stars
const canvas = document.getElementById("bg");
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);

const geometry = new THREE.SphereGeometry(0.05, 16, 16);
const material = new THREE.MeshBasicMaterial({ color: 0x00ffff });
const stars = [];
for (let i=0; i<200; i++) {
  const star = new THREE.Mesh(geometry, material);
  star.position.set((Math.random()-0.5)*100,(Math.random()-0.5)*100,(Math.random()-0.5)*100);
  scene.add(star);
  stars.push(star);
}
camera.position.z = 12;

function animate() {
  requestAnimationFrame(animate);
  stars.forEach(star => { star.rotation.x += 0.01; star.rotation.y += 0.01; });
  renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
